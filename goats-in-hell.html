// --- TEXTURE GENERATION ---
function generateTextures() {
  const textures = {};
  const c = document.createElement('canvas');
  c.width = TEX_SIZE; c.height = TEX_SIZE;
  const tx = c.getContext('2d');

  // Wall 1: Stone bricks (hell stone)
  tx.fillStyle = '#442222';
  tx.fillRect(0, 0, 64, 64);
  for (let row = 0; row < 4; row++) {
    const offset = (row % 2) * 16;
    for (let col = 0; col < 3; col++) {
      const bx = offset + col * 22;
      const by = row * 16;
      tx.fillStyle = `rgb(${60+Math.random()*30}, ${18+Math.random()*15}, ${18+Math.random()*15})`;
      tx.fillRect(bx + 1, by + 1, 20, 14);
      // cracks
      if (Math.random() > 0.6) {
        tx.strokeStyle = '#220808';
        tx.beginPath();
        tx.moveTo(bx + 5 + Math.random()*10, by + 2);
        tx.lineTo(bx + 8 + Math.random()*8, by + 12);
        tx.stroke();
      }
    }
  }
  textures[1] = ctx.createPattern(c, 'repeat') || tx.getImageData(0, 0, 64, 64);
  textures['1data'] = tx.getImageData(0, 0, 64, 64);

  // Wall 2: Flesh wall
  tx.fillStyle = '#661a1a';
  tx.fillRect(0, 0, 64, 64);
  for (let i = 0; i < 200; i++) {
    const px = Math.random() * 64, py = Math.random() * 64;
    tx.fillStyle = `rgba(${140+Math.random()*60}, ${20+Math.random()*30}, ${20+Math.random()*20}, 0.4)`;
    tx.fillRect(px, py, 2 + Math.random()*3, 1 + Math.random()*2);
  }
  // veins
  for (let i = 0; i < 4; i++) {
    tx.strokeStyle = `rgba(180, 30, 30, 0.5)`;
    tx.lineWidth = 1;
    tx.beginPath();
    tx.moveTo(Math.random()*64, Math.random()*64);
    tx.bezierCurveTo(Math.random()*64, Math.random()*64, Math.random()*64, Math.random()*64, Math.random()*64, Math.random()*64);
    tx.stroke();
  }
  textures['2data'] = tx.getImageData(0, 0, 64, 64);

  // Wall 3: Lava rock
  tx.fillStyle = '#1a0a00';
  tx.fillRect(0, 0, 64, 64);
  for (let i = 0; i < 300; i++) {
    const px = Math.random() * 64, py = Math.random() * 64;
    const r = Math.random();
    if (r > 0.85) {
      tx.fillStyle = `rgba(255, ${100+Math.random()*100}, 0, ${0.3+Math.random()*0.5})`;
    } else {
      tx.fillStyle = `rgba(${30+Math.random()*30}, ${10+Math.random()*15}, ${Math.random()*10}, 0.5)`;
    }
    tx.fillRect(px, py, 1 + Math.random()*3, 1 + Math.random()*3);
  }
  textures['3data'] = tx.getImageData(0, 0, 64, 64);

  // Wall 4: Dark obsidian
  tx.fillStyle = '#0a0510';
  tx.fillRect(0, 0, 64, 64);
  for (let i = 0; i < 150; i++) {
    const px = Math.random() * 64, py = Math.random() * 64;
    tx.fillStyle = `rgba(${40+Math.random()*30}, ${10+Math.random()*20}, ${40+Math.random()*40}, 0.3)`;
    tx.fillRect(px, py, 2 + Math.random()*4, 1 + Math.random()*2);
  }
  // purple glowing runes
  for (let i = 0; i < 3; i++) {
    tx.fillStyle = `rgba(150, 50, 200, ${0.2+Math.random()*0.3})`;
    tx.beginPath();
    tx.arc(10 + Math.random()*44, 10 + Math.random()*44, 2 + Math.random()*3, 0, Math.PI*2);
    tx.fill();
  }
  textures['4data'] = tx.getImageData(0, 0, 64, 64);

  // Wall 5: Door
  tx.fillStyle = '#443322';
  tx.fillRect(0, 0, 64, 64);
  tx.fillStyle = '#332211';
  tx.fillRect(2, 2, 28, 60);
  tx.fillRect(34, 2, 28, 60);
  tx.fillStyle = '#aa8844';
  tx.beginPath();
  tx.arc(52, 32, 3, 0, Math.PI*2);
  tx.fill();
  // hinges
  tx.fillStyle = '#665533';
  tx.fillRect(0, 10, 4, 8);
  tx.fillRect(0, 46, 4, 8);
  textures['5data'] = tx.getImageData(0, 0, 64, 64);

  return textures;
}

// --- AUDIO (procedural) ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playSound(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  switch(type) {
    case 'shoot': {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.start(now); osc.stop(now + 0.15);
      // noise burst
      const noise = audioCtx.createBufferSource();
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.03));
      noise.buffer = buf;
      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0.4, now);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      noise.connect(ng); ng.connect(audioCtx.destination);
      noise.start(now);
      break;
    }
    case 'hit':
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.1);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
      break;
    case 'goat_die':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(60, now + 0.4);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
      break;
    case 'goat_alert':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.setValueAtTime(350, now + 0.1);
      osc.frequency.setValueAtTime(200, now + 0.2);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
      break;
    case 'pickup':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.setValueAtTime(660, now + 0.05);
      osc.frequency.setValueAtTime(880, now + 0.1);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
      break;
    case 'hurt':
      osc.type = 'square';
      osc.frequency.setValueAtTime(100, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
      break;
    case 'door':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(80, now);
      osc.frequency.setValueAtTime(120, now + 0.2);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
      break;
    case 'empty':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(80, now);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      osc.start(now); osc.stop(now + 0.05);
      break;
    case 'reload':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.setValueAtTime(500, now + 0.1);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.start(now); osc.stop(now + 0.15);
      break;
    case 'boss_hit':
      osc.type = 'square';
      osc.frequency.setValueAtTime(60, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
      gain.gain.setValueAtTime(0.35, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
      break;
  }
}

// --- RESIZE ---
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  NUM_RAYS = Math.floor(W / 2);
}
window.addEventListener('resize', resize);
resize();

// --- INPUT ---
document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
document.addEventListener('mousemove', e => {
  if (pointerLocked) mouseMovX += e.movementX;
});
canvas.addEventListener('click', () => {
  if (gameRunning && !pointerLocked) {
    canvas.requestPointerLock();
  }
  if (gameRunning && pointerLocked) shoot();
});
document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === canvas;
});

// --- ENEMY CLASS ---
class Enemy {
  constructor(x, y, type) {
    this.x = x; this.y = y; this.type = type;
    this.alive = true;
    this.alert = false;
    this.attackCooldown = 0;
    this.deathTimer = 0;
    this.hitFlash = 0;
    this.moveTimer = Math.random() * 100;

    if (type === 'goat') {
      this.hp = 3; this.maxHp = 3; this.speed = 0.015; this.damage = 8; this.attackRange = 1.5;
      this.scoreValue = 100; this.size = 0.4;
    } else if (type === 'hellgoat') {
      this.hp = 6; this.maxHp = 6; this.speed = 0.02; this.damage = 15; this.attackRange = 1.8;
      this.scoreValue = 250; this.size = 0.5;
    } else if (type === 'boss') {
      this.hp = 30; this.maxHp = 30; this.speed = 0.012; this.damage = 20; this.attackRange = 2.5;
      this.scoreValue = 1000; this.size = 0.8;
      this.shootCooldown = 0;
    }
  }

  distToPlayer() {
    return Math.hypot(this.x - player.x, this.y - player.y);
  }

  update(map) {
    if (!this.alive) {
      this.deathTimer++;
      return;
    }
    this.hitFlash = Math.max(0, this.hitFlash - 1);
    this.moveTimer++;
    this.attackCooldown = Math.max(0, this.attackCooldown - 1);

    const dist = this.distToPlayer();

    // Alert range
    if (dist < 8) this.alert = true;

    if (this.alert) {
      // Move toward player
      const ang = Math.atan2(player.y - this.y, player.x - this.x);
      const wobble = Math.sin(this.moveTimer * 0.05) * 0.3;
      const moveAng = ang + wobble;

      if (dist > this.attackRange * 0.8) {
        const nx = this.x + Math.cos(moveAng) * this.speed;
        const ny = this.y + Math.sin(moveAng) * this.speed;
        if (map[Math.floor(ny)] && map[Math.floor(ny)][Math.floor(nx)] === 0) {
          this.x = nx; this.y = ny;
        } else if (map[Math.floor(this.y)] && map[Math.floor(this.y)][Math.floor(nx)] === 0) {
          this.x = nx;
        } else if (map[Math.floor(ny)] && map[Math.floor(ny)][Math.floor(this.x)] === 0) {
          this.y = ny;
        }
      }

      // Attack
      if (dist < this.attackRange && this.attackCooldown <= 0) {
        player.hp -= this.damage;
        damageFlash = DAMAGE_FLASH_DURATION;
        screenShake = 10;
        playSound('hurt');
        this.attackCooldown = 60;
      }

      // Boss shoots fireballs
      if (this.type === 'boss' && dist > 3 && dist < 12) {
        this.shootCooldown = (this.shootCooldown || 0) - 1;
        if (this.shootCooldown <= 0) {
          const fireAng = Math.atan2(player.y - this.y, player.x - this.x);
          projectiles.push({
            x: this.x, y: this.y, dx: Math.cos(fireAng) * 0.08, dy: Math.sin(fireAng) * 0.08,
            life: 120, damage: 12
          });
          this.shootCooldown = 90;
        }
      }
    }
  }

  takeDamage(dmg) {
    this.hp -= dmg;
    this.hitFlash = 8;
    this.alert = true;
    if (this.type === 'boss') playSound('boss_hit');
    else playSound('hit');
    if (this.hp <= 0) {
      this.alive = false;
      this.deathTimer = 0;
      kills++;
      totalKills++;
      score += this.scoreValue;
      playSound('goat_die');
      // death particles
      for (let i = 0; i < 8; i++) {
        particles.push({
          x: this.x, y: this.y, z: 0.3 + Math.random()*0.4,
          vx: (Math.random()-0.5)*0.03, vy: (Math.random()-0.5)*0.03, vz: Math.random()*0.02,
          life: 40 + Math.random()*30,
          color: this.type === 'boss' ? [200,0,255] : [200, 30, 30],
          size: 3 + Math.random()*4
        });
      }
    }
  }
}

// --- GAME STATE ---
function initLevel(levelIdx) {
  const level = LEVELS[levelIdx];
  const map = level.map;

  player = {
    x: level.spawn.x, y: level.spawn.y, angle: level.spawn.a,
    hp: player ? Math.min(player.hp + 25, 100) : 100,
    maxHp: 100, ammo: MAX_AMMO
  };

  enemies = level.enemies.map(e => new Enemy(e.x, e.y, e.type));
  pickups = level.pickups.map(p => ({ ...p, active: true }));
  doors = [];
  projectiles = [];
  particles = [];
  kills = 0;
  isReloading = false;

  // Find doors in map
  for (let y = 0; y < map.length; y++) {
    for (let x = 0; x < map[y].length; x++) {
      if (map[y][x] === 5) {
        doors.push({ x, y, open: false, timer: 0 });
      }
    }
  }

  // Show level name
  const flash = document.getElementById('level-flash');
  flash.textContent = level.name;
  flash.style.display = 'block';
  levelFlashTimer = 120;
}

// --- SHOOT ---
function shoot() {
  const now = Date.now();
  if (now - lastShot < SHOOT_COOLDOWN || isReloading) return;

  if (player.ammo <= 0) {
    playSound('empty');
    reload();
    return;
  }

  lastShot = now;
  player.ammo--;
  weaponKick = 12;
  gunFlashTimer = 6;
  screenShake = 3;
  playSound('shoot');

  // Raycast to find hit enemy
  const map = LEVELS[currentLevel].map;
  let hitEnemy = null;
  let hitDist = Infinity;

  for (const enemy of enemies) {
    if (!enemy.alive) continue;
    const dx = enemy.x - player.x;
    const dy = enemy.y - player.y;
    const dist = Math.hypot(dx, dy);
    const ang = Math.atan2(dy, dx) - player.angle;
    const normAng = ((ang + Math.PI) % (Math.PI * 2)) - Math.PI;

    // Check if in crosshair (wider for closer enemies)
    const spreadAngle = Math.atan2(enemy.size, dist);
    if (Math.abs(normAng) < spreadAngle && dist < hitDist) {
      // Check line of sight
      let blocked = false;
      const steps = Math.floor(dist * 4);
      for (let s = 1; s < steps; s++) {
        const cx = player.x + (dx / steps) * s;
        const cy = player.y + (dy / steps) * s;
        const mx = Math.floor(cx), my = Math.floor(cy);
        if (map[my] && map[my][mx] > 0 && map[my][mx] !== 5) { blocked = true; break; }
        // door check
        if (map[my] && map[my][mx] === 5) {
          const door = doors.find(d => d.x === mx && d.y === my);
          if (door && !door.open) { blocked = true; break; }
        }
      }
      if (!blocked) {
        hitEnemy = enemy;
        hitDist = dist;
      }
    }
  }

  if (hitEnemy) {
    const dmg = hitDist < 2 ? 3 : hitDist < 5 ? 2 : 1;
    hitEnemy.takeDamage(dmg);
  }

  // Muzzle particles
  for (let i = 0; i < 3; i++) {
    particles.push({
      x: player.x + Math.cos(player.angle)*0.3, y: player.y + Math.sin(player.angle)*0.3, z: 0.3,
      vx: Math.cos(player.angle)*0.02 + (Math.random()-0.5)*0.01,
      vy: Math.sin(player.angle)*0.02 + (Math.random()-0.5)*0.01,
      vz: (Math.random()-0.5)*0.01,
      life: 10 + Math.random()*10,
      color: [255, 200, 50],
      size: 2 + Math.random()*2
    });
  }
}

function reload() {
  if (isReloading || player.ammo >= MAX_AMMO) return;
  isReloading = true;
  reloadStart = Date.now();
  playSound('reload');
}

// --- UPDATE ---
function update() {
  if (!gameRunning) return;

  const map = LEVELS[currentLevel].map;

  // Mouse look
  player.angle += mouseMovX * MOUSE_SENS;
  mouseMovX = 0;

  // Keyboard look
  if (keys['arrowleft']) player.angle -= ROT_SPEED;
  if (keys['arrowright']) player.angle += ROT_SPEED;

  // Movement
  let speed = MOVE_SPEED;
  if (keys['shift']) speed *= SPRINT_MULT;

  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) { dx += Math.cos(player.angle) * speed; dy += Math.sin(player.angle) * speed; }
  if (keys['s'] || keys['arrowdown']) { dx -= Math.cos(player.angle) * speed; dy -= Math.sin(player.angle) * speed; }
  if (keys['a']) { dx += Math.cos(player.angle - Math.PI/2) * speed * 0.7; dy += Math.sin(player.angle - Math.PI/2) * speed * 0.7; }
  if (keys['d']) { dx += Math.cos(player.angle + Math.PI/2) * speed * 0.7; dy += Math.sin(player.angle + Math.PI/2) * speed * 0.7; }

  // Collision with walls (with margin)
  const margin = 0.2;
  const nx = player.x + dx;
  const ny = player.y + dy;
  const canMoveX = canWalk(nx + (dx > 0 ? margin : -margin), player.y, map);
  const canMoveY = canWalk(player.x, ny + (dy > 0 ? margin : -margin), map);
  if (canMoveX) player.x = nx;
  if (canMoveY) player.y = ny;

  // Walk bob
  if (dx !== 0 || dy !== 0) weaponBob += 0.08;

  // Shooting (keyboard)
  if (keys[' ']) shoot();
  if (keys['r']) reload();

  // Reload
  if (isReloading && Date.now() - reloadStart > RELOAD_TIME) {
    player.ammo = MAX_AMMO;
    isReloading = false;
  }

  // Open doors
  if (keys['e']) {
    for (const door of doors) {
      const dist = Math.hypot(door.x + 0.5 - player.x, door.y + 0.5 - player.y);
      if (dist < 2 && !door.open) {
        door.open = true;
        door.timer = 0;
        map[door.y][door.x] = 0;
        playSound('door');
      }
    }
    keys['e'] = false;
  }

  // Enemies
  for (const enemy of enemies) enemy.update(map);

  // Projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.dx; p.y += p.dy; p.life--;
    // Hit wall
    const mx = Math.floor(p.x), my = Math.floor(p.y);
    if (map[my] && map[my][mx] > 0) { projectiles.splice(i, 1); continue; }
    // Hit player
    if (Math.hypot(p.x - player.x, p.y - player.y) < 0.4) {
      player.hp -= p.damage;
      damageFlash = DAMAGE_FLASH_DURATION;
      screenShake = 8;
      playSound('hurt');
      projectiles.splice(i, 1); continue;
    }
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }
    // Trail
    if (Math.random() > 0.5) {
      particles.push({
        x: p.x, y: p.y, z: 0.3,
        vx: (Math.random()-0.5)*0.005, vy: (Math.random()-0.5)*0.005, vz: (Math.random()-0.5)*0.005,
        life: 15, color: [255, 100, 0], size: 2
      });
    }
  }

  // Pickups
  for (const p of pickups) {
    if (!p.active) continue;
    if (Math.hypot(p.x - player.x, p.y - player.y) < PICKUP_RANGE) {
      if (p.type === 'health' && player.hp < 100) {
        player.hp = Math.min(100, player.hp + 30);
        p.active = false;
        playSound('pickup');
        score += 25;
      } else if (p.type === 'ammo') {
        player.ammo = MAX_AMMO;
        p.active = false;
        playSound('pickup');
        score += 25;
      }
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.z += p.vz;
    p.vz -= 0.0005;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Damage effects
  damageFlash = Math.max(0, damageFlash - 16);
  screenShake = Math.max(0, screenShake * 0.9 - 0.1);
  weaponKick = Math.max(0, weaponKick * 0.85);
  gunFlashTimer = Math.max(0, gunFlashTimer - 1);

  // Level flash
  if (levelFlashTimer > 0) {
    levelFlashTimer--;
    const flash = document.getElementById('level-flash');
    flash.style.opacity = levelFlashTimer > 60 ? 1 : levelFlashTimer / 60;
    if (levelFlashTimer <= 0) flash.style.display = 'none';
  }

  // Death
  if (player.hp <= 0) {
    gameRunning = false;
    document.exitPointerLock();
    document.getElementById('death-score').textContent = `Score: ${score} | Goats Vanquished: ${totalKills}`;
    document.getElementById('death-screen').style.display = 'flex';
    return;
  }

  // Level complete
  if (enemies.every(e => !e.alive)) {
    if (currentLevel < LEVELS.length - 1) {
      currentLevel++;
      initLevel(currentLevel);
    } else {
      gameRunning = false;
      document.exitPointerLock();
      document.getElementById('win-score').textContent = `Final Score: ${score} | Total Goats Vanquished: ${totalKills}`;
      document.getElementById('win-screen').style.display = 'flex';
    }
  }
}

function canWalk(x, y, map) {
  const mx = Math.floor(x), my = Math.floor(y);
  if (!map[my] || map[my][mx] === undefined) return false;
  if (map[my][mx] === 0) return true;
  // Open doors
  if (map[my][mx] === 5) {
    const door = doors.find(d => d.x === mx && d.y === my);
    return door && door.open;
  }
  return false;
}

// --- RENDER ---
function render() {
  const map = LEVELS[currentLevel].map;
  const mapH = map.length;
  const mapW = map[0].length;

  // Screen shake offset
  const shakeX = (Math.random() - 0.5) * screenShake;
  const shakeY = (Math.random() - 0.5) * screenShake;

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Sky (hell ceiling)
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H / 2);
  skyGrad.addColorStop(0, '#0a0015');
  skyGrad.addColorStop(0.5, '#1a0520');
  skyGrad.addColorStop(1, '#330a10');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H / 2);

  // Floor
  const floorGrad = ctx.createLinearGradient(0, H / 2, 0, H);
  floorGrad.addColorStop(0, '#330808');
  floorGrad.addColorStop(0.3, '#441111');
  floorGrad.addColorStop(1, '#220505');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, H / 2, W, H / 2);

  // --- RAYCASTING ---
  const zBuffer = new Float32Array(NUM_RAYS);
  const stripW = W / NUM_RAYS;

  for (let i = 0; i < NUM_RAYS; i++) {
    const rayAngle = player.angle - HALF_FOV + (i / NUM_RAYS) * FOV;
    const sin = Math.sin(rayAngle);
    const cos = Math.cos(rayAngle);

    let dist = 0;
    let hitX, hitY, wallType = 1;
    let side = 0;

    // DDA raycasting
    const dirX = cos, dirY = sin;
    const mapX0 = Math.floor(player.x), mapY0 = Math.floor(player.y);
    let mapXi = mapX0, mapYi = mapY0;

    const deltaDistX = Math.abs(1 / (dirX || 0.00001));
    const deltaDistY = Math.abs(1 / (dirY || 0.00001));

    let stepX, stepY, sideDistX, sideDistY;
    if (dirX < 0) { stepX = -1; sideDistX = (player.x - mapXi) * deltaDistX; }
    else { stepX = 1; sideDistX = (mapXi + 1 - player.x) * deltaDistX; }
    if (dirY < 0) { stepY = -1; sideDistY = (player.y - mapYi) * deltaDistY; }
    else { stepY = 1; sideDistY = (mapYi + 1 - player.y) * deltaDistY; }

    let hit = false;
    for (let step = 0; step < 64; step++) {
      if (sideDistX < sideDistY) {
        sideDistX += deltaDistX;
        mapXi += stepX;
        side = 0;
      } else {
        sideDistY += deltaDistY;
        mapYi += stepY;
        side = 1;
      }
      if (mapYi >= 0 && mapYi < mapH && mapXi >= 0 && mapXi < mapW && map[mapYi][mapXi] > 0) {
        // Check if door is open
        if (map[mapYi][mapXi] === 5) {
          const door = doors.find(d => d.x === mapXi && d.y === mapYi);
          if (door && door.open) continue;
        }
        wallType = map[mapYi][mapXi];
        hit = true;
        break;
      }
    }

    if (side === 0) dist = sideDistX - deltaDistX;
    else dist = sideDistY - deltaDistY;
    if (dist < 0.01) dist = 0.01;

    // Fish-eye correction
    const perpDist = dist * Math.cos(rayAngle - player.angle);
    zBuffer[i] = perpDist;

    const wallHeight = H / perpDist;
    const wallTop = (H - wallHeight) / 2;
    const wallBottom = wallTop + wallHeight;

    // Texture coordinates
    let texX;
    if (side === 0) texX = player.y + dist * sin;
    else texX = player.x + dist * cos;
    texX = texX - Math.floor(texX);
    let texCol = Math.floor(texX * TEX_SIZE);
    if (texCol < 0) texCol = 0;
    if (texCol >= TEX_SIZE) texCol = TEX_SIZE - 1;

    // Get texture data
    const texData = textures[wallType + 'data'];
    if (texData) {
      const darkFactor = side === 1 ? 0.7 : 1.0;
      const fogFactor = Math.max(0, 1 - perpDist / MAX_DEPTH);
      const bright = darkFactor * fogFactor;

      for (let y = Math.max(0, Math.floor(wallTop)); y < Math.min(H, Math.floor(wallBottom)); y++) {
        const texY = Math.floor(((y - wallTop) / wallHeight) * TEX_SIZE);
        const idx = (Math.min(texY, TEX_SIZE-1) * TEX_SIZE + texCol) * 4;
        const r = texData.data[idx] * bright;
        const g = texData.data[idx+1] * bright;
        const b = texData.data[idx+2] * bright;
        ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
        ctx.fillRect(i * stripW, y, stripW + 1, 1);
      }
    } else {
      // Fallback
      const shade = side === 1 ? 0.6 : 0.8;
      const fog = Math.max(0, 1 - perpDist / MAX_DEPTH);
      const c = Math.floor(80 * shade * fog);
      ctx.fillStyle = `rgb(${c},${c/3|0},${c/3|0})`;
      ctx.fillRect(i * stripW, wallTop, stripW + 1, wallHeight);
    }
  }

  // --- SPRITES (enemies, pickups, projectiles) ---
  // Collect all sprites
  const sprites = [];

  for (const enemy of enemies) {
    if (!enemy.alive && enemy.deathTimer > 60) continue;
    sprites.push({ x: enemy.x, y: enemy.y, type: 'enemy', ref: enemy });
  }
  for (const p of pickups) {
    if (!p.active) continue;
    sprites.push({ x: p.x, y: p.y, type: 'pickup', ref: p });
  }
  for (const p of projectiles) {
    sprites.push({ x: p.x, y: p.y, type: 'projectile', ref: p });
  }

  // Sort by distance (far first)
  sprites.sort((a, b) => {
    const da = Math.hypot(a.x - player.x, a.y - player.y);
    const db = Math.hypot(b.x - player.x, b.y - player.y);
    return db - da;
  });

  for (const sprite of sprites) {
    const dx = sprite.x - player.x;
    const dy = sprite.y - player.y;
    const dist = Math.hypot(dx, dy);
    const angle = Math.atan2(dy, dx) - player.angle;
    const normAngle = ((angle + Math.PI) % (Math.PI * 2)) - Math.PI;

    if (Math.abs(normAngle) > HALF_FOV + 0.2) continue;
    if (dist < 0.3) continue;

    const screenX = W / 2 + (normAngle / HALF_FOV) * (W / 2);
    const fog = Math.max(0, 1 - dist / MAX_DEPTH);
    const spriteH = (H / dist);

    if (sprite.type === 'enemy') {
      const enemy = sprite.ref;
      const eSize = enemy.size;
      const h = spriteH * eSize;
      const w = h * 0.7;
      const top = (H - h) / 2 + (1 - eSize) * spriteH * 0.3;

      if (!enemy.alive) {
        // Dead goat
        const fadeOut = Math.max(0, 1 - enemy.deathTimer / 60);
        drawDeadGoat(screenX, top, w, h, enemy.type, fog * fadeOut, dist, zBuffer, stripW);
      } else {
        drawGoat(screenX, top, w, h, enemy, fog, dist, zBuffer, stripW);
      }
    } else if (sprite.type === 'pickup') {
      const p = sprite.ref;
      const h = spriteH * 0.3;
      const w = h;
      const top = (H + spriteH * 0.2) / 2;
      const bobY = Math.sin(Date.now() * 0.003) * 5;
      drawPickup(screenX, top + bobY, w, h, p.type, fog, dist, zBuffer, stripW);
    } else if (sprite.type === 'projectile') {
      const h = spriteH * 0.15;
      const screenY = H / 2;
      drawFireball(screenX, screenY, h, fog, dist, zBuffer, stripW);
    }
  }

  // --- PARTICLES ---
  for (const p of particles) {
    const dx = p.x - player.x;
    const dy = p.y - player.y;
    const dist = Math.hypot(dx, dy);
    const angle = Math.atan2(dy, dx) - player.angle;
    const normAngle = ((angle + Math.PI) % (Math.PI * 2)) - Math.PI;
    if (Math.abs(normAngle) > HALF_FOV) continue;

    const screenX = W / 2 + (normAngle / HALF_FOV) * (W / 2);
    const heightScale = H / dist;
    const screenY = H / 2 - (p.z - 0.5) * heightScale;
    const alpha = Math.min(1, p.life / 20);
    const size = p.size * (H / dist) * 0.02;

    ctx.globalAlpha = alpha;
    ctx.fillStyle = `rgb(${p.color[0]},${p.color[1]},${p.color[2]})`;
    ctx.fillRect(screenX - size/2, screenY - size/2, size, size);
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // --- HUD ---
  drawHUD();

  // --- MINIMAP ---
  drawMinimap(map);

  // --- WEAPON ---
  drawWeapon();

  // --- CROSSHAIR ---
  ctx.strokeStyle = '#ff4422';
  ctx.lineWidth = 2;
  const cx = W/2, cy = H/2;
  ctx.beginPath(); ctx.moveTo(cx - 12, cy); ctx.lineTo(cx - 5, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 5, cy); ctx.lineTo(cx + 12, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy - 12); ctx.lineTo(cx, cy - 5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy + 5); ctx.lineTo(cx, cy + 12); ctx.stroke();

  // Damage flash
  if (damageFlash > 0) {
    ctx.fillStyle = `rgba(200, 0, 0, ${damageFlash / DAMAGE_FLASH_DURATION * 0.4})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Low health vignette
  if (player.hp < 30) {
    const pulse = 0.2 + Math.sin(Date.now() * 0.005) * 0.1;
    const grad = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.7);
    grad.addColorStop(0, 'rgba(100,0,0,0)');
    grad.addColorStop(1, `rgba(150,0,0,${pulse})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
}

// --- DRAW GOAT SPRITE ---
function drawGoat(sx, sy, w, h, enemy, fog, dist, zBuffer, stripW) {
  const isHit = enemy.hitFlash > 0;
  const isBoss = enemy.type === 'boss';
  const isHell = enemy.type === 'hellgoat';

  const left = Math.floor(sx - w/2);
  const right = Math.floor(sx + w/2);
  const top = Math.floor(sy);
  const bottom = Math.floor(sy + h);

  for (let x = Math.max(0, left); x < Math.min(W, right); x++) {
    const rayIdx = Math.floor(x / stripW);
    if (rayIdx >= 0 && rayIdx < zBuffer.length && zBuffer[rayIdx] < dist) continue;

    const tx = (x - left) / (right - left);

    for (let y = Math.max(0, top); y < Math.min(H, bottom); y++) {
      const ty = (y - top) / (bottom - top);

      let color = getGoatPixel(tx, ty, enemy.type, Date.now());
      if (!color) continue;

      if (isHit) {
        color = [255, 255, 255];
      }

      const r = Math.floor(color[0] * fog);
      const g = Math.floor(color[1] * fog);
      const b = Math.floor(color[2] * fog);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(x, y, 1, 1);
    }
  }

  // Health bar for boss
  if (isBoss && enemy.alive) {
    const barW = w * 1.2;
    const barH = 4;
    const barX = sx - barW/2;
    const barY = sy - 10;
    ctx.fillStyle = '#440000';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(barX, barY, barW * (enemy.hp / enemy.maxHp), barH);
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('BAPHOGOAT', sx, barY - 3);
  }
}

function getGoatPixel(tx, ty, type, time) {
  // Procedural goat sprite
  const isBoss = type === 'boss';
  const isHell = type === 'hellgoat';

  // Body (ellipse)
  const bodyX = 0.5, bodyY = 0.6;
  const bodyRX = 0.3, bodyRY = 0.22;
  const bodyDist = ((tx - bodyX) / bodyRX) ** 2 + ((ty - bodyY) / bodyRY) ** 2;

  // Head
  const headX = 0.5, headY = 0.32;
  const headR = 0.12;
  const headDist = Math.hypot(tx - headX, ty - headY) / headR;

  // Horns
  const hornL = Math.hypot(tx - 0.32, ty - 0.18) < 0.08 && ty < 0.28 && tx < 0.42;
  const hornR = Math.hypot(tx - 0.68, ty - 0.18) < 0.08 && ty < 0.28 && tx > 0.58;
  const hornL2 = Math.hypot(tx - 0.26, ty - 0.12) < 0.05;
  const hornR2 = Math.hypot(tx - 0.74, ty - 0.12) < 0.05;

  // Legs
  const legWidth = 0.05;
  const leg1 = tx > 0.28 && tx < 0.28 + legWidth && ty > 0.75 && ty < 0.95;
  const leg2 = tx > 0.38 && tx < 0.38 + legWidth && ty > 0.75 && ty < 0.95;
  const leg3 = tx > 0.57 && tx < 0.57 + legWidth && ty > 0.75 && ty < 0.95;
  const leg4 = tx > 0.67 && tx < 0.67 + legWidth && ty > 0.75 && ty < 0.95;

  // Eyes (glowing)
  const eyeL = Math.hypot(tx - 0.43, ty - 0.30) < 0.03;
  const eyeR = Math.hypot(tx - 0.57, ty - 0.30) < 0.03;
  // Pupils (horizontal slit)
  const pupilL = Math.abs(ty - 0.30) < 0.008 && Math.abs(tx - 0.43) < 0.02;
  const pupilR = Math.abs(ty - 0.30) < 0.008 && Math.abs(tx - 0.57) < 0.02;

  // Beard
  const beard = tx > 0.42 && tx < 0.58 && ty > 0.40 && ty < 0.52 && Math.random() > 0.3;

  // Tail
  const tail = Math.hypot(tx - 0.8, ty - 0.52) < 0.04 || Math.hypot(tx - 0.85, ty - 0.48) < 0.03;

  // Pentagram on boss forehead
  const pentagram = isBoss && Math.hypot(tx - 0.5, ty - 0.23) < 0.04;

  let baseColor;
  if (isBoss) baseColor = [80, 20, 30];
  else if (isHell) baseColor = [100, 30, 20];
  else baseColor = [90, 70, 50];

  // Eyes glow
  if (eyeL || eyeR) {
    if (pupilL || pupilR) return [0, 0, 0]; // slit pupil
    const glow = 0.8 + Math.sin(time * 0.01) * 0.2;
    if (isBoss) return [255 * glow, 50, 255 * glow]; // purple eyes
    if (isHell) return [255 * glow, 100 * glow, 0]; // orange
    return [255 * glow, 200 * glow, 0]; // yellow
  }

  if (pentagram) return [255, 50, 50];

  if (hornL || hornR || hornL2 || hornR2) {
    if (isBoss) return [60, 10, 60];
    if (isHell) return [50, 10, 10];
    return [40, 30, 25];
  }

  if (headDist < 1) return baseColor;
  if (bodyDist < 1) {
    // Some variation
    const v = (Math.sin(tx * 20) * Math.cos(ty * 15)) * 10;
    return [baseColor[0]+v, baseColor[1]+v, baseColor[2]+v];
  }
  if (leg1 || leg2 || leg3 || leg4) return [baseColor[0]*0.7, baseColor[1]*0.7, baseColor[2]*0.7];
  if (beard) return [baseColor[0]*0.8, baseColor[1]*0.8, baseColor[2]*0.8];
  if (tail) return baseColor;

  // Fire aura for boss
  if (isBoss) {
    const auraDist = Math.hypot(tx - 0.5, ty - 0.5);
    if (auraDist < 0.5 && auraDist > 0.35 && Math.random() > 0.5) {
      const flicker = Math.random();
      return [200 + flicker*55, 50 + flicker*50, flicker*30];
    }
  }

  return null;
}

function drawDeadGoat(sx, sy, w, h, type, fog, dist, zBuffer, stripW) {
  // Flattened / collapsed version
  const left = Math.floor(sx - w*0.6);
  const right = Math.floor(sx + w*0.6);
  const top = Math.floor(sy + h * 0.6);
  const bottom = Math.floor(sy + h);

  for (let x = Math.max(0, left); x < Math.min(W, right); x++) {
    const rayIdx = Math.floor(x / stripW);
    if (rayIdx >= 0 && rayIdx < zBuffer.length && zBuffer[rayIdx] < dist) continue;

    for (let y = Math.max(0, top); y < Math.min(H, bottom); y++) {
      const tx = (x - left) / (right - left);
      const ty = (y - top) / (bottom - top);
      if (((tx-0.5)**2 + (ty-0.5)**2) > 0.25) continue;

      const r = Math.floor(80 * fog);
      const g = Math.floor(20 * fog);
      const b = Math.floor(20 * fog);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(x, y, 1, 1);
    }
  }
}

function drawPickup(sx, sy, w, h, type, fog, dist, zBuffer, stripW) {
  const left = Math.floor(sx - w/2);
  const right = Math.floor(sx + w/2);
  const top = Math.floor(sy - h/2);
  const bottom = Math.floor(sy + h/2);

  for (let x = Math.max(0, left); x < Math.min(W, right); x++) {
    const rayIdx = Math.floor(x / stripW);
    if (rayIdx >= 0 && rayIdx < zBuffer.length && zBuffer[rayIdx] < dist) continue;

    for (let y = Math.max(0, top); y < Math.min(H, bottom); y++) {
      const tx = (x - left) / (right - left);
      const ty = (y - top) / (bottom - top);
      const d = Math.hypot(tx - 0.5, ty - 0.5);
      if (d > 0.4) continue;

      let r, g, b;
      const glow = 0.7 + Math.sin(Date.now() * 0.005) * 0.3;
      if (type === 'health') {
        r = 50; g = 220 * glow; b = 50;
        // Cross
        if ((Math.abs(tx - 0.5) < 0.08 && ty > 0.2 && ty < 0.8) ||
            (Math.abs(ty - 0.5) < 0.08 && tx > 0.2 && tx < 0.8)) {
          r = 255; g = 255; b = 255;
        }
      } else {
        r = 220 * glow; g = 180 * glow; b = 30;
        // Bullet shape
        if (Math.abs(tx - 0.5) < 0.1 && ty > 0.3 && ty < 0.7) {
          r = 200; g = 150; b = 50;
        }
      }

      ctx.fillStyle = `rgb(${Math.floor(r*fog)},${Math.floor(g*fog)},${Math.floor(b*fog)})`;
      ctx.fillRect(x, y, 1, 1);
    }
  }
}

function drawFireball(sx, sy, size, fog, dist, zBuffer, stripW) {
  const r = size * 0.5;
  for (let x = Math.floor(sx - r); x < Math.floor(sx + r); x++) {
    if (x < 0 || x >= W) continue;
    const rayIdx = Math.floor(x / stripW);
    if (rayIdx >= 0 && rayIdx < zBuffer.length && zBuffer[rayIdx] < dist) continue;
    for (let y = Math.floor(sy - r); y < Math.floor(sy + r); y++) {
      if (y < 0 || y >= H) continue;
      const d = Math.hypot(x - sx, y - sy) / r;
      if (d > 1) continue;
      const bright = (1 - d) * fog;
      const flicker = 0.8 + Math.random() * 0.2;
      ctx.fillStyle = `rgb(${Math.floor(255*bright*flicker)},${Math.floor(120*bright*flicker)},${Math.floor(20*bright)})`;
      ctx.fillRect(x, y, 1, 1);
    }
  }
}

// --- WEAPON ---
function drawWeapon() {
  const bobX = Math.sin(weaponBob) * 8;
  const bobY = Math.abs(Math.cos(weaponBob)) * 6;
  const kickY = weaponKick * 3;
  const baseX = W / 2 + bobX;
  const baseY = H - 120 + bobY + kickY;

  // Gun flash
  if (gunFlashTimer > 0) {
    ctx.fillStyle = `rgba(255, 200, 50, ${gunFlashTimer / 6 * 0.6})`;
    ctx.beginPath();
    ctx.arc(baseX, baseY - 60, 30 + Math.random()*10, 0, Math.PI * 2);
    ctx.fill();
  }

  // Shotgun body
  ctx.fillStyle = '#333';
  ctx.fillRect(baseX - 8, baseY - 50, 16, 80);
  ctx.fillStyle = '#555';
  ctx.fillRect(baseX - 6, baseY - 55, 12, 60);
  // Barrel
  ctx.fillStyle = '#222';
  ctx.fillRect(baseX - 4, baseY - 70, 8, 25);
  ctx.fillStyle = '#444';
  ctx.fillRect(baseX - 3, baseY - 70, 6, 20);
  // Grip
  ctx.fillStyle = '#442200';
  ctx.fillRect(baseX - 6, baseY + 20, 12, 30);
  ctx.fillStyle = '#553311';
  ctx.fillRect(baseX - 5, baseY + 22, 10, 26);
  // Pump
  ctx.fillStyle = '#555';
  ctx.fillRect(baseX - 7, baseY - 20, 14, 10);

  // Reload animation
  if (isReloading) {
    const progress = (Date.now() - reloadStart) / RELOAD_TIME;
    const tiltAngle = Math.sin(progress * Math.PI) * 0.3;
    ctx.save();
    ctx.translate(baseX, baseY);
    ctx.rotate(tiltAngle);
    ctx.fillStyle = '#aa8844';
    ctx.fillRect(-3, -10, 6, 12);
    ctx.restore();
  }

  // Hand
  ctx.fillStyle = '#cc9966';
  ctx.fillRect(baseX - 12, baseY + 10, 24, 15);
  ctx.fillStyle = '#bb8855';
  ctx.fillRect(baseX + 8, baseY + 5, 8, 20);
}

// --- HUD ---
function drawHUD() {
  const padding = 20;

  // Health
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(padding, H - 60, 200, 40);
  ctx.strokeStyle = '#ff4422';
  ctx.lineWidth = 1;
  ctx.strokeRect(padding, H - 60, 200, 40);

  ctx.fillStyle = player.hp > 25 ? '#cc0000' : (Date.now() % 500 < 250 ? '#ff0000' : '#880000');
  ctx.fillRect(padding + 4, H - 56, (192) * (player.hp / player.maxHp), 32);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`HP: ${Math.max(0, Math.ceil(player.hp))}`, padding + 100, H - 35);

  // Ammo
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(padding, H - 110, 200, 40);
  ctx.strokeStyle = '#ffaa00';
  ctx.strokeRect(padding, H - 110, 200, 40);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'left';

  if (isReloading) {
    const progress = (Date.now() - reloadStart) / RELOAD_TIME;
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(padding + 4, H - 106, 192 * progress, 32);
    ctx.fillStyle = '#000';
    ctx.textAlign = 'center';
    ctx.fillText('RELOADING...', padding + 100, H - 85);
  } else {
    // Ammo shells
    for (let i = 0; i < MAX_AMMO; i++) {
      ctx.fillStyle = i < player.ammo ? '#ffaa00' : '#333';
      ctx.fillRect(padding + 10 + i * 23, H - 102, 16, 24);
      if (i < player.ammo) {
        ctx.fillStyle = '#cc8800';
        ctx.fillRect(padding + 12 + i * 23, H - 100, 12, 6);
      }
    }
  }

  // Score
  ctx.fillStyle = '#ff8844';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`SCORE: ${score}`, W - padding, 30);
  ctx.fillText(`KILLS: ${kills}/${enemies.length}`, W - padding, 52);
  ctx.fillText(`LEVEL: ${currentLevel + 1}/${LEVELS.length}`, W - padding, 74);

  // Level name
  ctx.fillStyle = '#ff4422';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(LEVELS[currentLevel].name, W/2, 25);
}

// --- MINIMAP ---
function drawMinimap(map) {
  const mapH = map.length;
  const mapW = map[0].length;
  const mmW = mapW * MINIMAP_SCALE;
  const mmH = mapH * MINIMAP_SCALE;
  const mmX = W - mmW - MINIMAP_MARGIN;
  const mmY = H - mmH - MINIMAP_MARGIN;

  ctx.globalAlpha = 0.7;
  ctx.fillStyle = '#000';
  ctx.fillRect(mmX - 2, mmY - 2, mmW + 4, mmH + 4);

  for (let y = 0; y < mapH; y++) {
    for (let x = 0; x < mapW; x++) {
      if (map[y][x] > 0) {
        const wallColors = { 1: '#442222', 2: '#661a1a', 3: '#1a0a00', 4: '#0a0510', 5: '#443322' };
        ctx.fillStyle = wallColors[map[y][x]] || '#444';
      } else {
        ctx.fillStyle = '#1a0808';
      }
      ctx.fillRect(mmX + x * MINIMAP_SCALE, mmY + y * MINIMAP_SCALE, MINIMAP_SCALE, MINIMAP_SCALE);
    }
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    ctx.fillStyle = e.type === 'boss' ? '#ff00ff' : e.type === 'hellgoat' ? '#ff8800' : '#ff0000';
    ctx.fillRect(mmX + e.x * MINIMAP_SCALE - 1, mmY + e.y * MINIMAP_SCALE - 1, 3, 3);
  }

  // Pickups
  for (const p of pickups) {
    if (!p.active) continue;
    ctx.fillStyle = p.type === 'health' ? '#00ff00' : '#ffff00';
    ctx.fillRect(mmX + p.x * MINIMAP_SCALE - 1, mmY + p.y * MINIMAP_SCALE - 1, 2, 2);
  }

  // Player
  ctx.fillStyle = '#00ff00';
  ctx.fillRect(mmX + player.x * MINIMAP_SCALE - 2, mmY + player.y * MINIMAP_SCALE - 2, 4, 4);
  // Direction line
  ctx.strokeStyle = '#00ff00';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(mmX + player.x * MINIMAP_SCALE, mmY + player.y * MINIMAP_SCALE);
  ctx.lineTo(
    mmX + (player.x + Math.cos(player.angle) * 1.5) * MINIMAP_SCALE,
    mmY + (player.y + Math.sin(player.angle) * 1.5) * MINIMAP_SCALE
  );
  ctx.stroke();

  ctx.globalAlpha = 1;
}

// --- GAME LOOP ---
function gameLoop() {
  if (gameRunning) {
    update();
    render();
  }
  requestAnimationFrame(gameLoop);
}

// --- START ---
function startGame() {
  initAudio();
  textures = generateTextures();
  currentLevel = 0;
  score = 0;
  totalKills = 0;
  player = null;
  initLevel(0);

  document.getElementById('overlay').style.display = 'none';
  document.getElementById('death-screen').style.display = 'none';
  document.getElementById('win-screen').style.display = 'none';

  gameRunning = true;
  canvas.requestPointerLock();
}

// Make startGame global
window.startGame = startGame;

// Start loop
gameLoop();
</script>
