name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Unit tests, TypeScript, lint
  # ------------------------------------------------------------------
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm exec jest --ci

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

  # ------------------------------------------------------------------
  # Asset manifest integrity
  # ------------------------------------------------------------------
  validate-manifests:
    name: Validate Asset Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate manifest artifact references
        run: node scripts/validate-manifests.mjs
